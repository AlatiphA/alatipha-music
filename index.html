<style>
  :root {
    --bg: #f8f9fc;
    --text: #1e2937;
    --card: #ffffff;
    --search-bg: #ffffff;
    --search-border: #c9a47f;
    --player-bg: rgba(255,255,255,0.95);
    --accent: #956433;
    --accent-light: #c9a47f;
    --border: rgba(149,100,51,0.3);
    --shadow: rgba(0,0,0,0.08);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0a0f1c;
      --text: #f1f5f9;
      --card: rgba(255,255,255,0.06);
      --player-bg: rgba(15,23,42,0.92);
      --accent: #c9a47f;
    }
  }
  
  html, body {
  overscroll-behavior-y: contain;
  touch-action: manipulation;
}

  body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  .app {
    padding: 20px 20px 240px;
    max-width: 960px;
    margin: auto;
    text-align: left;
  }

  h2 {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 18px;
    background: linear-gradient(90deg, var(--accent), var(--accent-light));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  
  #list{
    height:520px;
    overflow-y:auto;
    overflow-x:hidden;   /* hide horizontal scrollbar */
    position:relative;
}

/* SIDE MENU */
.side-menu {
  position: fixed;
  top: 0;
  left: -260px;
  width: 260px;
  height: 100%;
  background: var(--card);
  box-shadow: 4px 0 20px rgba(0,0,0,0.2);
  z-index: 2000;
  transition: left 0.3s ease;
}

.side-menu.open {
  left: 0;
}

.menu-content {
  padding: 20px;
  text-align: left;
}

.menu-content h3 {
  margin-bottom: 20px;
}

.menu-item {
  display: block;
  width: 100%;
  padding: 12px;
  margin-bottom: 8px;
  border: none;
  background: none;
  text-align: left;
  font-size: 16px;
  cursor: pointer;
  color: var(--text);
}

.menu-item:hover {
  background: rgba(201,164,127,0.2);
  border-radius: 8px;
}

/* OVERLAY */
.menu-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.35);
  z-index: 1500;
  display: none;
}

.menu-overlay.show {
  display: block;
}

  /* SEARCH */
  .search-container {
    position: relative;
    width: 100%;
    margin: 0 auto 14px;
  }

  #search {
    width: 100%;
    padding: 11px 42px 11px 14px;
    border: 2px solid var(--search-border);
    border-radius: 12px;
    background: var(--search-bg);
    color: var(--text);
    font-size: 15.5px;
    box-sizing: border-box;
    outline: none;
  }

  #search::placeholder {
    color: #94a3b8;
    opacity: 1;
  }

  @media (prefers-color-scheme: dark) {
    #search {
      background: rgba(255,255,255,0.08);
      color: #f1f5f9;
      border-color: rgba(201,164,127,0.5);
    }

    #search::placeholder {
      color: #94a3b8;
    }
  }

  .clear-btn {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    font-size: 18px;
    color: #64748b;
    cursor: pointer;
    display: none;
    padding: 3px;
  }

  .clear-btn:hover {
    color: var(--accent);
  }

  /* TABS */
  .filter-tabs{
   display:flex;
   gap:10px;
   justify-content:flex-start;
   overflow-x:auto;
   padding:6px 2px 12px;
   scrollbar-width:none;
   -webkit-overflow-scrolling:touch;
   flex-wrap:nowrap;
}

  .filter-tabs::-webkit-scrollbar{
   display:none;
}

  .tab-btn{
   flex:0 0 auto;
   padding:9px 18px;
   white-space:nowrap;
   font-size:14px;
   border-radius:999px;
   border:1px solid var(--border);
   background:var(--card);
   color:var(--text);
   transition:.25s ease;
}

   .tab-btn.active{
   background:linear-gradient(
   90deg,
   var(--accent),
   var(--accent-light)
);

   color:#fff;
   border-color:transparent;
   box-shadow:0 4px 14px rgba(149,100,51,.25);
}

  /* SONG LIST */
  .song{
   display:flex;
   align-items:center;
   gap:8px;
   width:100%;
   box-sizing:border-box;
   padding:6px 10px;
   margin:4px 0;
   background:var(--card);
   border:1px solid var(--border);
   border-radius:10px;
   cursor:pointer;
   transition:.3s;
   overflow:hidden;
}

  .song:hover {
    transform: translateX(6px);
    background: rgba(201,164,127,0.12);
  }

  .song img {
    width: 34px;
    height: 34px;
    border-radius: 6px;
    object-fit: cover;
    flex-shrink: 0;
  }

  .song span{
    flex:1;
    min-width:0;
    overflow:hidden;
    display:block;
    position:relative;
}

  .song-title{
    display:inline-flex;
    white-space:nowrap;
    width:max-content;
}

  .song-right{
   display:flex;
   align-items:center;
   justify-content:flex-end;
   gap:6px;
   width:72px;   /* fixed right column */
   flex-shrink:0;
}

  .duration {
    font-size: 12px;
    color: #64748b;
    white-space: nowrap;
    width:42px;
    min-width: 40px;
    text-align: right;
  }

  .heart {
    background: none;
    border: none;
    font-size: 22px;
    cursor: pointer;
    color: #64748b;
  }

  .heart.liked {
    color: #ef4444;
  }

  .song.active {
    background: linear-gradient(90deg, var(--accent), var(--accent-light)) !important;
    color: white !important;
    border-color: transparent;
  }

  /* PLAYER */
.player {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: var(--player-bg);
  backdrop-filter: blur(22px);
  border-top: 1px solid var(--border);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 -10px 30px var(--shadow);
  z-index: 1000;
  box-sizing: border-box;
  
  transition: height 0.3s ease, transform 0.3s ease;
  will-change: transform;
  touch-action: pan-y;
  overflow: hidden;
  cursor: grab;
}

  #cover{
    width:60px;
    height:60px;
    border-radius:50%;
    object-fit:cover;
    flex-shrink:0;
    position:relative;
    will-change:transform;
    transform:translateZ(0);
    backface-visibility:hidden;

box-shadow:
0 0 0 3px rgba(255,255,255,.08),
0 0 0 6px rgba(0,0,0,.18);
}

/* vinyl center hole */
  #cover::after{
    content:"";
    position:absolute;
    width:12px;
    height:12px;
    border-radius:50%;
    background:#111;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    box-shadow:0 0 0 3px #999 inset;
}

/* while metadata loading */
   #cover.loading{
     animation:
     rotateCover 3s linear infinite,
     recordGlow 1.8s ease-in-out infinite;
     filter:saturate(1.08);
}

/* when actually playing, use your normal slower spin */
    #cover.playing{
      animation:rotateCover 18s linear infinite;
}

    @keyframes rotateCover{
       from{transform:rotate(0deg)}
       to{transform:rotate(360deg)}
}

     @keyframes recordGlow{
0%{box-shadow:0 0 0 3px rgba(255,255,255,.08),0 0 0 6px rgba(0,0,0,.18)}
50%{box-shadow:0 0 0 3px rgba(201,164,127,.35),0 0 18px rgba(201,164,127,.35)}
100%{box-shadow:0 0 0 3px rgba(255,255,255,.08),0 0 0 6px rgba(0,0,0,.18)}
}

  .info {
    flex: 1;
    min-width: 0;
    text-align: center;
  }

  #title{
  display:block;
  overflow:hidden;
  white-space:nowrap;
  position:relative;
  width: 100%; /* Update Marquee */
}

#title span{
  display:inline-block;
  white-space:nowrap;
}

/* animation */
#title.marquee span{
  animation-name: playerTicker;
  animation-timing-function: linear;
  animation-iteration-count: infinite;
}

#title.marquee span {
  animation-name: playerTicker;
  animation-timing-function: linear;
  animation-iteration-count: infinite;
  animation-delay: 1.2s; /* smooth pause before scroll */
}

#title.marquee span::after {
  content: attr(data-title);
  padding-left: 60px;
}

.player.mini #title.marquee span::after {
  padding-left: 40px;
}

@keyframes playerTicker{
  0% { transform: translateX(0); }
  100% { transform: translateX(-100%); }
}

  #time {

/* CONTROLS */
   .controls {
    display: flex;

}

/* BUTTON BASE */
    .controls button {

     border-radius: 50%;
     font-size: 19px;

     align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      background: rgba(149,100,51,0.15);
      color: var(--text);
      cursor: pointer;
      position: relative;
      overflow: hidden;

  /* ELASTIC ANIMATION */
  transition:
    transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1),
    background 0.2s ease,
    color 0.2s ease,
    box-shadow 0.2s ease;

  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  user-select: none;
}

/* DESKTOP HOVER */
@media (hover: hover) and (pointer: fine) {
  .controls button:hover {
    background: var(--accent);
    color: white;
    transform: scale(1.06);
  }
}

/* ACTIVE TOGGLED STATE */
.controls button.active {
  background: var(--accent);
  color: white;
  box-shadow: 0 0 10px rgba(201,164,127,0.45);
}

/* PRESS (ELASTIC FEEL) */
.controls button:active {
  transform: scale(0.88);
  background: var(--accent);
  color: white;
}

/* RIPPLE (HAPTIC-LIKE) */
.controls button::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: rgba(255,255,255,0.25);
  opacity: 0;
  transform: scale(0.6);
  transition: all 0.25s ease;
  pointer-events: none;
}

.controls button:active::after {
  opacity: 1;
  transform: scale(1.2);
}

/* PLAY BUTTON */
.play-btn {
  width: 60px !important;
  height: 60px !important;
  font-size: 27px !important;
  background: var(--accent) !important;
  color: white !important;
  border: none !important;
}

.play-btn.pause {
  font-size: 23px !important;
}

  #volume {
    width: 120px;
    accent-color: var(--accent);
  }

  /* MENU */
  .menu-popup {
    position: absolute;
    bottom: 80px;
    right: 20px;
    background: var(--player-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 8px 0;
    box-shadow: 0 10px 30px var(--shadow);
    display: none;
    flex-direction: column;
    z-index: 1100;
    min-width: 170px;
  }

  .menu-popup button {
    padding: 12px 20px;
    text-align: left;
    background: none;
    border: none;
    font-size: 15.5px;
    cursor: pointer;
    color: var(--text);
  }

  .menu-popup button:hover {
    background: rgba(201,164,127,0.15);
  }

  /* MOBILE */
  @media (max-width: 680px) {
    .app { padding-bottom: 245px; }
    #search { font-size: 14.5px; }
    .song img { width: 32px; height: 32px; }
    .player { flex-direction: column; }
    .controls button { width: 36px; height: 36px; font-size: 16px; }
  }

/* MINI PLAYER MODE (VISIBLE CHANGE) */
.player.mini {
  height: 65px;
  padding: 8px 12px;
  flex-direction: row;
  align-items: center;
}

/* shrink cover */
.player.mini #cover {
  width: 44px;
  height: 44px;
}

/* compress info */
.player.mini .info {
  flex: 1;
  text-align: left;
    min-width: 0;
}

/* title */
.player.mini #title {
  font-size: 13px;
  width: 100%;
  overflow: hidden;
  white-space: nowrap;
}

/* hide heavy UI completely */
.player.mini .bar,
.player.mini #time,
.player.mini #volume,
.player.mini #shuffle,
.player.mini #repeat,
.player.mini #menu-btn {
  display: none !important;
}

/* controls layout */
.player.mini .controls {
  flex-wrap: nowrap;
  gap: 4px;
}

/* shrink buttons */
.player.mini .controls button {
  width: 34px;
  height: 34px;
  font-size: 14px;
}

/* play button */
.player.mini #play {
  width: 42px !important;
  height: 42px !important;
  font-size: 18px !important;
}

/* collapse button stays visible */
.player.mini #collapse-btn {
  opacity: 1;
  background: var(--accent);
  color: white;
}
</style>

// =======================
// STATE LAYER
// =======================
const STATE = {
  songs: songs,
  currentIndex: (() => {
  const i = parseInt(localStorage.getItem("index"));
  return isNaN(i) ? 0 : i;
})(),

  favorites: JSON.parse(localStorage.getItem("favorites")) || [],
  activePlaylist: "all",
  showFavoritesOnly: false,
  shuffle: false,
  repeat: localStorage.getItem("repeat") || "off",
  isMuted: JSON.parse(localStorage.getItem("muted")) || false,
lastVolume: parseFloat(localStorage.getItem("volume")) || 1,
  isMini: false,
  isSeeking: false,
  view: "home", 
  touchStartTime: 0,
  isSwipeAllowed: false,
  durations: {}, 
  renderTimer: null, 
  nextBufferAudio: new Audio(), 
};

const DURATION_KEY = "alatipha_durations_v2";

try {
  const cached = JSON.parse(localStorage.getItem(DURATION_KEY));

  if (cached && typeof cached === "object") {
    STATE.durations = cached.durations || {};
    STATE.durationHash = cached.hash || "";
  }

} catch (e) {
  STATE.durations = {};
  STATE.durationHash = "";
}

function generateSongHash() {
  return STATE.songs.map(s => s.src).join("|");
}

console.log("Songs loaded:", STATE.songs.length);

//DURATION LOADER 
function loadDurations() {

  const currentHash = generateSongHash();

  // ✅ If songs unchanged and durations exist → STOP
  if (
    STATE.durationHash === currentHash &&
    Object.keys(STATE.durations).length === STATE.songs.length
  ) {
    console.log("Durations already cached. Skipping scan.");
    return;
  }

  console.log("Scanning durations...");

  STATE.durationHash = currentHash;

  let index = 0;

  function scanNext() {

    if (index >= STATE.songs.length) {
      console.log("Duration scan complete.");
      saveDurations();
      return;
    }

    // skip already cached
    if (STATE.durations[index]) {
      index++;
      scanNext();
      return;
    }

    const audio = new Audio();
    audio.src = STATE.songs[index].src;
    audio.preload = "metadata";

    audio.addEventListener("loadedmetadata", () => {

      const duration = audio.duration;

      if (duration && isFinite(duration)) {
        STATE.durations[index] = duration;

        // Save progressively (safe)
        saveDurations();

        // Update only that item visually
        updateSingleDuration(index, duration);
      }

      index++;

      // throttle to avoid UI lag
      setTimeout(scanNext, 150);
    });

    audio.addEventListener("error", () => {
      index++;
      setTimeout(scanNext, 150);
    });
  }

  scanNext();
}

function updateSingleDuration(index, duration) {

  const el = DOM.list.querySelector(
    `.song[data-index="${index}"] .duration`
  );

  if (el) {
    el.textContent = formatTime(duration);
  }
}

function saveDurations() {
  try {
    localStorage.setItem(
      DURATION_KEY,
      JSON.stringify({
        durations: STATE.durations,
        hash: STATE.durationHash
      })
    );
  } catch (e) {
    console.log("Duration save failed", e);
  }
}

function scheduleRender() {

  if (STATE.renderTimer) return;

  STATE.renderTimer = requestAnimationFrame(() => {
    renderList(DOM.search.value);
    STATE.renderTimer = null;
  });
}


function loadSong(){
  const song = STATE.songs[STATE.currentIndex];
  if(!song) return;

  DOM.audio.src = song.src;
  DOM.cover.src = song.cover || COVER || "";
    if (!DOM.cover.src) {
  DOM.cover.src = COVER;
}

  DOM.title.innerHTML =
    `<span data-title="${song.title}">${song.title}</span>`;
    
  DOM.cover.classList.add("loading");

  DOM.audio.addEventListener("canplay", () => {
  DOM.cover.classList.remove("loading");
}, { once: true });

  updateMarquee();

  DOM.playBtn.innerHTML = '<i class="fas fa-play"></i>';
  DOM.playBtn.classList.remove("pause");
}

function playSong(){
  DOM.audio.play().then(()=>{
    DOM.playBtn.innerHTML = '<i class="fas fa-pause"></i>';
    DOM.playBtn.classList.add("pause");
    DOM.cover.classList.add("playing");
    setTimeout(preloadNextTrack, 200);
    savePlaybackState(true);
  });
}

function pauseSong(){
  DOM.audio.pause();
  DOM.playBtn.innerHTML = '<i class="fas fa-play"></i>';
  DOM.playBtn.classList.remove("pause");
  DOM.cover.classList.remove("playing");
  savePlaybackState(false);
}

function nextSong(){
  STATE.currentIndex =
    (STATE.currentIndex + 1) % STATE.songs.length;

  saveState();
  loadSong();
  playSong();
}

function prevSong(){
  STATE.currentIndex =
    (STATE.currentIndex - 1 + STATE.songs.length) % STATE.songs.length;

  saveState();
  loadSong();
  playSong();
}

function updateRepeatButton() {

  DOM.repeatBtn.classList.remove("active");

  if (STATE.repeat === "off") {
    DOM.repeatBtn.innerHTML = '<i class="fas fa-redo"></i>';
  }

  if (STATE.repeat === "one") {
    DOM.repeatBtn.classList.add("active");
    DOM.repeatBtn.innerHTML = '<i class="fas fa-redo"></i>';
  }

  if (STATE.repeat === "all") {
    DOM.repeatBtn.classList.add("active");
    DOM.repeatBtn.innerHTML = '<i class="fas fa-repeat"></i>';
  }
}

function preloadNextTrack() {

  const nextIndex = getNextIndex("next");
  if (nextIndex === null) return;

  const nextSong = STATE.songs[nextIndex];
  if (!nextSong) return;

  if (STATE.nextBufferAudio.src === nextSong.src) return;

  STATE.nextSongIndex = nextIndex;

  STATE.nextBufferAudio.src = nextSong.src;
  STATE.nextBufferAudio.load();

  STATE.nextBufferAudio.play()
    .then(() => {
      STATE.nextBufferAudio.pause();
      STATE.nextBufferAudio.currentTime = 0;
    })
    .catch(() => {});
}


function saveState(){
  localStorage.setItem("index", STATE.currentIndex);
}

function savePlaybackState(isPlaying) {

}

  if (!span) return;

  // reset first
  DOM.title.classList.remove("marquee");
  span.style.animationDuration = "0s";

  // WAIT for layout to settle properly
  setTimeout(() => {

    const textWidth = span.scrollWidth;
    const containerWidth = DOM.title.clientWidth;

    // debug (optional)
    // console.log({ textWidth, containerWidth });

    if (textWidth > containerWidth) {

      // slower base speed
let speed = 30;

// even slower in mini player (feels more natural)
if (STATE.isMini) speed = 22;

const gap = STATE.isMini ? 40 : 60;
const distance = textWidth + gap;

// minimum duration so short overflow doesn't rush
let duration = distance / speed;
duration = Math.max(duration, 6); // never faster than 6s

span.style.animationDuration = duration + "s";

      span.style.animationDuration = duration + "s";

      DOM.title.classList.add("marquee");
    }

  }, 50); // small delay is key
}

function updateTime(){
  if(!DOM.audio.duration) return;

  if (!STATE.isSeeking) {
  DOM.progress.style.width =
    (DOM.audio.currentTime / DOM.audio.duration) * 100 + "%";
}

  DOM.time.textContent =
    formatTime(DOM.audio.currentTime) +
    " / " +
    formatTime(DOM.audio.duration);
}

function formatTime(s) {

  if (!s || isNaN(s) || !isFinite(s)) return "--:--";

  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);

  return m + ":" + (sec < 10 ? "0" : "") + sec;
}

function getPlaylistByTag(tag){

  const normalized = (tag || "").toLowerCase();

  return STATE.songs
    .map((song, index) => ({ song, index }))
    .filter(item => {

      if(normalized === "all") return true;

      if(!item.song.tags) return false;

      return item.song.tags
        .map(t => t.toLowerCase())
        .includes(normalized);

    });
}

function getCurrentPlaylist(){

  if(STATE.showFavoritesOnly){
    return STATE.songs
      .map((song,index)=>({song,index}))
      .filter(item => STATE.favorites.includes(item.index));
  }

  return getPlaylistByTag(STATE.activePlaylist);
}

/* 🔥 SOURCE OF TRUTH FOR NAVIGATION */
function getNextIndex(direction = "next") {

  const playlist = getCurrentPlaylist();
  if (!playlist.length) return null;

  const currentPos = playlist.findIndex(
    item => item.index === STATE.currentIndex
  );

  if (currentPos === -1) return null;

  // REPEAT ONE
  if (STATE.repeat === "one") {
    return STATE.currentIndex;
  }

  // SHUFFLE
  if (STATE.shuffle) {

    if (playlist.length === 1) return STATE.currentIndex;

    let newPos;

    do {
      newPos = Math.floor(Math.random() * playlist.length);
    } while (playlist[newPos].index === STATE.currentIndex);

    return playlist[newPos].index;
  }

  // NORMAL MOVE
  let newPos = direction === "next"
    ? currentPos + 1
    : currentPos - 1;

  // REPEAT ALL
  if (STATE.repeat === "all") {
    if (newPos >= playlist.length) newPos = 0;
    if (newPos < 0) newPos = playlist.length - 1;
  }

  // REPEAT OFF
  if (STATE.repeat === "off") {
    if (newPos >= playlist.length || newPos < 0) {
      return null;
    }
  }

  return playlist[newPos].index;
}

//TIME UPDATER 
function seek(e) {

  const rect = DOM.bar.getBoundingClientRect();
  const x = e.touches ? e.touches[0].clientX : e.clientX;

  let percent = (x - rect.left) / rect.width;

  percent = Math.max(0, Math.min(1, percent));

  DOM.progress.style.width = (percent * 100) + "%";

  if (DOM.audio.duration) {
    DOM.audio.currentTime = percent * DOM.audio.duration;
  }
}

DOM.bar.addEventListener("click", seek);

//Start dragging
DOM.bar.addEventListener("mousedown", (e) => {
  STATE.isSeeking = true;
  seek(e);
});

DOM.bar.addEventListener("touchstart", (e) => {
  STATE.isSeeking = true;
  seek(e);
});

//Move while dragging
document.addEventListener("mousemove", (e) => {
  if (!STATE.isSeeking) return;
  seek(e);
});

document.addEventListener("touchmove", (e) => {
  if (!STATE.isSeeking) return;
  seek(e);
});

//End dragging
document.addEventListener("mouseup", () => {
  STATE.isSeeking = false;
});

document.addEventListener("touchend", () => {
  STATE.isSeeking = false;
});

//Prevent page scroll while dragging on mobile:
DOM.bar.addEventListener("touchmove", (e) => {
  if (STATE.isSeeking) e.preventDefault();
}, { passive: false });

//HIGHLIGHTING TRACKS
function highlightActiveTrack() {

  const current = document.querySelector(".song.active");
  if (current) current.classList.remove("active");

  const active = DOM.list.querySelector(
    `.song[data-index="${STATE.currentIndex}"]`
  );

  if (active) {
    active.classList.add("active");

    requestAnimationFrame(() => {
      active.scrollIntoView({
        block: "nearest",
        behavior: "smooth"
      });
    });
  }
}


function debounce(fn, delay = 200) {
  let timer;

  return function (...args) {
    clearTimeout(timer);
    timer = setTimeout(() => fn.apply(this, args), delay);
  };
}

const handleSearch = debounce((value) => {
  renderList(value);

  // only scroll when search is empty
  if (!value) {
    setTimeout(() => {
      highlightActiveTrack();
    }, 50);
  }
}, 200);

function getCurrentSong() {
  return STATE.songs[STATE.currentIndex] || null;
}

// =======================
// SWIPE GESTURES
// =======================

DOM.player.addEventListener("touchstart", (e) => {

  STATE.isSwipeAllowed = !e.target.closest(
    ".bar, #volume, button, input"
  );

  if (!STATE.isSwipeAllowed) return;

  const touch = e.touches[0];

  STATE.touchStartX = touch.clientX;
  STATE.touchStartY = touch.clientY;
  STATE.touchStartTime = Date.now();
});

DOM.player.addEventListener("touchend", (e) => {

  if (!STATE.isSwipeAllowed || STATE.isSeeking) return;

  const touch = e.changedTouches[0];

  STATE.touchEndX = touch.clientX;
  STATE.touchEndY = touch.clientY;

  const timeTaken = Date.now() - STATE.touchStartTime;

  handleSwipe(timeTaken);
});

function handleSwipe(timeTaken) {

  const dx = STATE.touchEndX - STATE.touchStartX;
  const dy = STATE.touchEndY - STATE.touchStartY;

  const absX = Math.abs(dx);
  const absY = Math.abs(dy);

  // distance thresholds
  const minDistance = 60;

  // velocity (px per ms)
  const velocityX = absX / timeTaken;
  const velocityY = absY / timeTaken;

  // fast swipe threshold
  const fastSwipe = 0.4;

  // ignore tiny movement
  if (absX < 20 && absY < 20) return;

  // HORIZONTAL
  if (absX > absY) {

    const isFast = velocityX > fastSwipe;

    if (absX > minDistance || isFast) {

      if (dx < 0) {
        // LEFT → NEXT
        const nextIndex = getNextIndex("next");

        if (nextIndex !== null) {
          STATE.currentIndex = nextIndex;
          loadSong();
          playSong();
          highlightActiveTrack();
          saveState();
        }

      } else {
        // RIGHT → PREVIOUS
        const prevIndex = getNextIndex("prev");

        if (prevIndex !== null) {
          STATE.currentIndex = prevIndex;
          loadSong();
          playSong();
          highlightActiveTrack();
          saveState();
        }
      }
    }
  }

  // VERTICAL
  else {

    const isFast = velocityY > fastSwipe;

    if (absY > minDistance || isFast) {

      if (dy > 0) {
        // DOWN → COLLAPSE
        STATE.isMini = true;
        DOM.player.classList.add("mini");
           setTimeout(updateMarquee, 80);
      } else {
        // UP → EXPAND
        STATE.isMini = false;
        DOM.player.classList.remove("mini");
          setTimeout(updateMarquee, 80);
      }
    }
  }
}





// =======================
// EVENTS
// =======================

DOM.playBtn.onclick = () => {
  DOM.audio.paused ? playSong() : pauseSong();
};

//NEXT BUTTON 
document.getElementById("next").onclick = () => {

  const nextIndex = getNextIndex("next");

  if (nextIndex === null) {
    pauseSong();
    return;
  }

  STATE.currentIndex = nextIndex;

  loadSong();
  playSong();
  highlightActiveTrack();
  saveState();
};

//PREVIOUS BUTTON  
document.getElementById("prev").onclick = () => {

  const prevIndex = getNextIndex("prev");

  if (prevIndex === null) return;

  STATE.currentIndex = prevIndex;

  loadSong();
  playSong();
  highlightActiveTrack();
  saveState();
};

DOM.clearBtn.onclick = () => {

  DOM.search.value = "";

  DOM.clearBtn.style.display = "none";

  renderList("");

setTimeout(() => {
  highlightActiveTrack();
}, 50);

  DOM.search.focus();
};

DOM.audio.addEventListener("timeupdate", updateTime);

//AUDIO
DOM.audio.addEventListener("ended", function () {

  const nextIndex = getNextIndex("next");

  if (nextIndex === null) {
    pauseSong();
    DOM.audio.currentTime = 0;
    return;
  }

  STATE.currentIndex = nextIndex;
  highlightActiveTrack();

  loadSong();
  playSong();
  saveState();
});

// MENU
if (DOM.menuToggle && DOM.overlay && DOM.sideMenu) {

  DOM.menuToggle.onclick = () => {
    DOM.sideMenu.classList.add("open");
    DOM.overlay.classList.add("show");
  };

  DOM.overlay.onclick = () => {
    DOM.sideMenu.classList.remove("open");
    DOM.overlay.classList.remove("show");
  };
}

// SIDE MENU NAVIGATION 
document.querySelectorAll(".menu-item").forEach(btn => {
  btn.onclick = () => {

    const view = btn.dataset.view;
    STATE.view = view;

    DOM.sideMenu.classList.remove("open");
    DOM.overlay.classList.remove("show");

    switchView(view);
  };
});


// COLLAPSE PLAYER
DOM.collapseBtn.onclick = () => {

  STATE.isMini = !STATE.isMini;

  DOM.player.classList.toggle("mini", STATE.isMini);

  // re-measure title after layout change
  setTimeout(updateMarquee, 80);
};


//TAB CLICK LOGIC 
document.querySelectorAll(".tab-btn[data-playlist]").forEach(btn => {

  btn.onclick = function(){

    STATE.showFavoritesOnly = false;
    STATE.activePlaylist = this.dataset.playlist.toLowerCase();

    renderList(DOM.search.value);
    updateActiveTab();
  };

});

//FAVORITES TAB 
DOM.tabFavorites.onclick = ()=>{
  STATE.showFavoritesOnly = true;
  renderList(DOM.search.value);
  updateActiveTab();
};

//ACTIVE TAB HIGHLIGHT 
function updateActiveTab(){

  document.querySelectorAll(".tab-btn")
    .forEach(btn => btn.classList.remove("active"));

  if(STATE.showFavoritesOnly){
    DOM.tabFavorites.classList.add("active");
    return;
  }

  const btn = [...document.querySelectorAll(".tab-btn[data-playlist]")]
    .find(b => b.dataset.playlist.toLowerCase() === STATE.activePlaylist);

  if(btn) btn.classList.add("active");
}

//SHUFFLE 
DOM.shuffleBtn.onclick = () => {

  STATE.shuffle = !STATE.shuffle;

  localStorage.setItem("shuffle", STATE.shuffle);

  updateShuffleButton();
};

//REPEAT 
DOM.repeatBtn.onclick = () => {

  if (STATE.repeat === "off") {
    STATE.repeat = "one";
  }
  else if (STATE.repeat === "one") {
    STATE.repeat = "all";
  }
  else {
    STATE.repeat = "off";
  }

  localStorage.setItem("repeat", STATE.repeat);

  updateRepeatButton();
};

//VOLUME SLIDER
DOM.volume.oninput = () => {

  STATE.lastVolume = parseFloat(DOM.volume.value);
  STATE.isMuted = STATE.lastVolume === 0;

  localStorage.setItem("volume", STATE.lastVolume);
  localStorage.setItem("muted", STATE.isMuted);

  applyVolume();
};

//MUTE
DOM.muteBtn.onclick = () => {

  STATE.isMuted = !STATE.isMuted;

  localStorage.setItem("muted", STATE.isMuted);

  applyVolume();
};


DOM.search.oninput = (e) => {

  const value = e.target.value;

  DOM.clearBtn.style.display = value ? "flex" : "none";

  handleSearch(value);
};

//PLAYER MENU
DOM.menuBtn.onclick = (e) => {
  e.stopPropagation();
  DOM.menuPopup.style.display =
    DOM.menuPopup.style.display === "flex" ? "none" : "flex";
};

// close when clicking outside
document.addEventListener("click", () => {
  DOM.menuPopup.style.display = "none";
});

// prevent closing when clicking inside menu
DOM.menuPopup.onclick = (e) => {
  e.stopPropagation();
};

// Menu Download 
DOM.menuDownload.onclick = () => {

  const song = getCurrentSong();
  if (!song) return;

  const link = document.createElement("a");
  link.href = song.src;
  link.download = song.title + ".mp3";

  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);

  const downloads = JSON.parse(localStorage.getItem("downloads")) || [];

  if (!downloads.includes(STATE.currentIndex)) {
    downloads.push(STATE.currentIndex);
    localStorage.setItem("downloads", JSON.stringify(downloads));
  }

  DOM.menuPopup.style.display = "none";
};

//Share
DOM.menuShare.onclick = async () => {

  const song = getCurrentSong();
  if (!song) return;

  const shareData = {
    title: song.title,
    text: "Listen to this track on AlatiphA Music",
    url: song.src
  };

  try {
    if (navigator.share) {
      await navigator.share(shareData);
    } else {
      await navigator.clipboard.writeText(song.src);
      alert("Link copied to clipboard");
    }
  } catch (err) {
    console.log("Share failed", err);
  }

  DOM.menuPopup.style.display = "none";
};






// =======================
// INIT
// =======================

function init(){

  renderList();

  loadSong();

  // 🔥 Force UI sync AFTER everything is ready
  setTimeout(() => {
    highlightActiveTrack();
    updateMarquee();
  }, 50);

  updateActiveTab();
  updateShuffleButton();
  updateRepeatButton();
  applyVolume();
  loadDurations();

  DOM.clearBtn.style.display = "none";
  
  const wasPlaying = JSON.parse(localStorage.getItem("isPlaying"));

if (wasPlaying) {
  playSong();
}
}

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.addEventListener("message", (event) => {
    if (event.data && event.data.type === "RELOAD") {
      window.location.reload();
    }
  });
}

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js").catch(console.error);
}

init();

})();
</script>
