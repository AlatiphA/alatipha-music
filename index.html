<body>

<div class="app">
  <h2><i class="fas fa-music"></i> AlatiphA Music</h2>
  
  <div class="search-container">
    <input type="text" id="search" placeholder="Search music...">
    <button id="clear-search" class="clear-btn"><i class="fas fa-times"></i></button>
  </div>

<div class="filter-tabs">

<button class="tab-btn active"
data-playlist="all">
All Songs
</button>

<button class="tab-btn"
data-playlist="newrelease">
New Release
</button>

<button class="tab-btn"
data-playlist="rap">
Rap
</button>

<button class="tab-btn"
data-playlist="RnB">
R&B
</button>

<button class="tab-btn"
data-playlist="remix">
Remix
</button>

<button class="tab-btn"
data-playlist="AfroBeat">
Afro-beat
</button>

<button id="tab-favorites"
class="tab-btn">
<i class="fas fa-heart"></i>
Favorites
</button>

</div>
  
  <div id="list"></div>
</div>

<div class="player">
  <img id="cover" src="" alt="cover" />
  
  <div class="info">
    <div id="title">No song selected</div>
    <div id="time">0:00 / 0:00</div>
    <div class="bar" id="bar">
      <div id="progress"></div>
    </div>
  </div>

  <div class="controls">
      <button id="shuffle"><i class="fas fa-random"></i></button>
      
    <button id="prev"><i class="fas fa-backward"></i></button>
    <button id="play" class="play-btn"><i class="fas fa-play"></i></button>
    <button id="next"><i class="fas fa-forward"></i></button>

    <button id="repeat"><i class="fas fa-redo"></i></button>
    <input id="volume" type="range" min="0" max="1" step="0.01" value="1">
    <button id="mute"><i class="fas fa-volume-up"></i></button>
    <button id="menu-btn"><i class="fas fa-ellipsis-v"></i></button>
      <button id="collapse-btn"><i class="fas fa-chevron-down"></i></button>
  </div>

  <div id="menu" class="menu-popup">
    <button id="menu-download"><i class="fas fa-download"></i> Download</button>
    <button id="menu-share"><i class="fas fa-share-alt"></i> Share</button>
  </div>

  <audio id="audio" preload="metadata"></audio>
</div>

<style>
  :root {
    --bg: #f8f9fc;
    --text: #1e2937;
    --card: #ffffff;
    --search-bg: #ffffff;
    --search-border: #c9a47f;
    --player-bg: rgba(255,255,255,0.95);
    --accent: #956433;
    --accent-light: #c9a47f;
    --border: rgba(149,100,51,0.3);
    --shadow: rgba(0,0,0,0.08);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0a0f1c;
      --text: #f1f5f9;
      --card: rgba(255,255,255,0.06);
      --player-bg: rgba(15,23,42,0.92);
      --accent: #c9a47f;
    }
  }

  body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  .app {
    padding: 20px 20px 240px;
    max-width: 960px;
    margin: auto;
    text-align: center;
  }

  h2 {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 18px;
    background: linear-gradient(90deg, var(--accent), var(--accent-light));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  
  #list{
    height:520px;
    overflow-y:auto;
    overflow-x:hidden;   /* hide horizontal scrollbar */
    position:relative;
}

  /* SEARCH */
  .search-container {
    position: relative;
    width: 100%;
    margin: 0 auto 14px;
  }

  #search {
    width: 100%;
    padding: 11px 42px 11px 14px;
    border: 2px solid var(--search-border);
    border-radius: 12px;
    background: var(--search-bg);
    color: var(--text);
    font-size: 15.5px;
    box-sizing: border-box;
    outline: none;
  }

  #search::placeholder {
    color: #94a3b8;
    opacity: 1;
  }

  @media (prefers-color-scheme: dark) {
    #search {
      background: rgba(255,255,255,0.08);
      color: #f1f5f9;
      border-color: rgba(201,164,127,0.5);
    }

    #search::placeholder {
      color: #94a3b8;
    }
  }

  .clear-btn {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    font-size: 18px;
    color: #64748b;
    cursor: pointer;
    display: none;
    padding: 3px;
  }

  .clear-btn:hover {
    color: var(--accent);
  }

  /* TABS */
  .filter-tabs{
   display:flex;
   gap:10px;
   justify-content:flex-start;
   overflow-x:auto;
   padding:6px 2px 12px;
   scrollbar-width:none;
   -webkit-overflow-scrolling:touch;
   flex-wrap:nowrap;
}

  .filter-tabs::-webkit-scrollbar{
   display:none;
}

  .tab-btn{
   flex:0 0 auto;
   padding:9px 18px;
   white-space:nowrap;
   font-size:14px;
   border-radius:999px;
   border:1px solid var(--border);
   background:var(--card);
   color:var(--text);
   transition:.25s ease;
}

   .tab-btn.active{
   background:linear-gradient(
   90deg,
   var(--accent),
   var(--accent-light)
);

   color:#fff;
   border-color:transparent;
   box-shadow:0 4px 14px rgba(149,100,51,.25);
}

  /* SONG LIST */
  .song{
   display:flex;
   align-items:center;
   gap:8px;
   width:100%;
   box-sizing:border-box;
   padding:6px 10px;
   margin:4px 0;
   background:var(--card);
   border:1px solid var(--border);
   border-radius:10px;
   cursor:pointer;
   transition:.3s;
   overflow:hidden;
}

  .song:hover {
    transform: translateX(6px);
    background: rgba(201,164,127,0.12);
  }

  .song img {
    width: 34px;
    height: 34px;
    border-radius: 6px;
    object-fit: cover;
    flex-shrink: 0;
  }

  .song span{
    flex:1;
    min-width:0;
    overflow:hidden;
    display:block;
    position:relative;
}

  .song-title{
    display:inline-flex;
    white-space:nowrap;
    width:max-content;
}

  .song-title.marquee{
   animation:ticker 12s linear infinite;
}

  .song-title::after{
   content:attr(data-title);
padding-left:60px; /* gap before repeat */
}

@keyframes ticker{
0%{
transform:translateX(0);
}
100%{
transform:translateX(-50%);
}
}

  .song-right{
   display:flex;
   align-items:center;
   justify-content:flex-end;
   gap:6px;
   width:72px;   /* fixed right column */
   flex-shrink:0;
}

  .duration {
    font-size: 12px;
    color: #64748b;
    white-space: nowrap;
    width:42px;
    min-width: 40px;
    text-align: right;
  }

  .heart {
    background: none;
    border: none;
    font-size: 22px;
    cursor: pointer;
    color: #64748b;
  }

  .heart.liked {
    color: #ef4444;
  }

  .song.active {
    background: linear-gradient(90deg, var(--accent), var(--accent-light)) !important;
    color: white !important;
    border-color: transparent;
  }

  /* PLAYER */
.player {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: var(--player-bg);
  backdrop-filter: blur(22px);
  border-top: 1px solid var(--border);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 -10px 30px var(--shadow);
  z-index: 1000;
  box-sizing: border-box;

  transition: height 0.3s ease, transform 0.3s ease;
  will-change: transform;
  touch-action: pan-y;
  overflow: hidden;
  cursor: grab;
}

  #cover{
    width:60px;
    height:60px;
    border-radius:50%;
    object-fit:cover;
    flex-shrink:0;
    position:relative;
    will-change:transform;
    transform:translateZ(0);
    backface-visibility:hidden;

box-shadow:
0 0 0 3px rgba(255,255,255,.08),
0 0 0 6px rgba(0,0,0,.18);
}

/* vinyl center hole */
  #cover::after{
    content:"";
    position:absolute;
    width:12px;
    height:12px;
    border-radius:50%;
    background:#111;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    box-shadow:0 0 0 3px #999 inset;
}

/* while metadata loading */
   #cover.loading{
     animation:
     rotateCover 3s linear infinite,
     recordGlow 1.8s ease-in-out infinite;
     filter:saturate(1.08);
}

/* when actually playing, use your normal slower spin */
    #cover.playing{
      animation:rotateCover 18s linear infinite;
}

    @keyframes rotateCover{
       from{transform:rotate(0deg)}
       to{transform:rotate(360deg)}
}

     @keyframes recordGlow{
0%{box-shadow:0 0 0 3px rgba(255,255,255,.08),0 0 0 6px rgba(0,0,0,.18)}
50%{box-shadow:0 0 0 3px rgba(201,164,127,.35),0 0 18px rgba(201,164,127,.35)}
100%{box-shadow:0 0 0 3px rgba(255,255,255,.08),0 0 0 6px rgba(0,0,0,.18)}
}

  .info {
    flex: 1;
    min-width: 0;
    text-align: center;
  }

  #title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  #time {
    font-size: 13px;
    color: #64748b;
    margin-bottom: 6px;
  }

  .bar {
    height: 6px;
    background: rgba(149,100,51,0.2);
    border-radius: 999px;
    cursor: pointer;
    margin: 0 auto;
  }

  #progress {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--accent-light));
    border-radius: 999px;
  }

/* CONTROLS */
   .controls {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
}

/* BUTTON BASE */
    .controls button {
     width: 44px;
     height: 44px;
     border-radius: 50%;
     font-size: 19px;
     display: flex;
     align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      background: rgba(149,100,51,0.15);
      color: var(--text);
      cursor: pointer;
      position: relative;
      overflow: hidden;

  /* ELASTIC ANIMATION */
  transition:
    transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1),
    background 0.2s ease,
    color 0.2s ease,
    box-shadow 0.2s ease;

  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  user-select: none;
}

/* DESKTOP HOVER */
@media (hover: hover) and (pointer: fine) {
  .controls button:hover {
    background: var(--accent);
    color: white;
    transform: scale(1.06);
  }
}

/* ACTIVE TOGGLED STATE */
.controls button.active {
  background: var(--accent);
  color: white;
  box-shadow: 0 0 10px rgba(201,164,127,0.45);
}

/* PRESS (ELASTIC FEEL) */
.controls button:active {
  transform: scale(0.88);
  background: var(--accent);
  color: white;
}

/* RIPPLE (HAPTIC-LIKE) */
.controls button::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: rgba(255,255,255,0.25);
  opacity: 0;
  transform: scale(0.6);
  transition: all 0.25s ease;
  pointer-events: none;
}

.controls button:active::after {
  opacity: 1;
  transform: scale(1.2);
}

/* PLAY BUTTON */
.play-btn {
  width: 60px !important;
  height: 60px !important;
  font-size: 27px !important;
  background: var(--accent) !important;
  color: white !important;
  border: none !important;
}

.play-btn.pause {
  font-size: 23px !important;
}

  #volume {
    width: 120px;
    accent-color: var(--accent);
  }

  /* MENU */
  .menu-popup {
    position: absolute;
    bottom: 80px;
    right: 20px;
    background: var(--player-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 8px 0;
    box-shadow: 0 10px 30px var(--shadow);
    display: none;
    flex-direction: column;
    z-index: 1100;
    min-width: 170px;
  }

  .menu-popup button {
    padding: 12px 20px;
    text-align: left;
    background: none;
    border: none;
    font-size: 15.5px;
    cursor: pointer;
    color: var(--text);
  }

  .menu-popup button:hover {
    background: rgba(201,164,127,0.15);
  }

  /* MOBILE */
  @media (max-width: 680px) {
    .app { padding-bottom: 245px; }
    #search { font-size: 14.5px; }
    .song img { width: 32px; height: 32px; }
    .player { flex-direction: column; }
    .controls button { width: 36px; height: 36px; font-size: 16px; }
  }

/* MINI PLAYER MODE (VISIBLE CHANGE) */
.player.mini {
  height: 65px;
  padding: 8px 12px;
  flex-direction: row;
  align-items: center;
}

/* shrink cover */
.player.mini #cover {
  width: 44px;
  height: 44px;
}

/* compress info */
.player.mini .info {
  flex: 1;
  text-align: left;
}

/* hide heavy UI completely */
.player.mini .bar,
.player.mini #time,
.player.mini #volume,
.player.mini #shuffle,
.player.mini #repeat,
.player.mini #menu-btn {
  display: none !important;
}

/* controls layout */
.player.mini .controls {
  flex-wrap: nowrap;
  gap: 4px;
}

/* shrink buttons */
.player.mini .controls button {
  width: 34px;
  height: 34px;
  font-size: 14px;
}

/* play button */
.player.mini #play {
  width: 42px !important;
  height: 42px !important;
  font-size: 18px !important;
}

/* title */
.player.mini #title {
  font-size: 13px;
}

/* collapse button stays visible */
.player.mini #collapse-btn {
  opacity: 1;
  background: var(--accent);
  color: white;
}
</style>

  function loadSong(){
  
  nextPreloaded = false;

if (audio.src !== songs[currentIndex].src) {
  audio.src = songs[currentIndex].src;
}

songs[currentIndex].title;

/* swap art without touching animation */

playBtn.innerHTML=
'<i class="fas fa-play"></i>';

cover.classList.remove("loading");

const s=Math.floor(audio.duration%60);

/* keep your spinning logic */
if(!audio.paused){
cover.classList.remove("paused");

function updateMediaSession(){

if(!("mediaSession" in navigator))
return;

navigator.mediaSession.metadata =
new MediaMetadata({

title:
songs[currentIndex].title,

artist:
"AlatiphA",

album:
"AlatiphA Music",

artwork:[
{
src:
songs[currentIndex].cover || COVER,
sizes:"512x512",
type:"image/png"
}
]

});

navigator.mediaSession.setActionHandler(
"play",
()=>playSong()
);

navigator.mediaSession.setActionHandler(
"pause",
()=>pauseSong()
);

navigator.mediaSession.setActionHandler(
"previoustrack",
()=>{
document
.getElementById("prev")
.click();
});

navigator.mediaSession.setActionHandler(
"nexttrack",
()=>{
document
.getElementById("next")
.click();
});

navigator.mediaSession.setActionHandler(
"seekbackward",
()=>{
audio.currentTime=
Math.max(
audio.currentTime-10,
0
);
});

navigator.mediaSession.setActionHandler(
"seekforward",
()=>{
audio.currentTime=
Math.min(
audio.currentTime+10,
audio.duration
);
});

function preloadNextTrack(){

const playlist=getCurrentPlaylist();
if(!playlist.length) return;

let nextPos;

if(shuffle){

nextPos=getNextShuffleIndex(playlist);

}else{

const currentPos=getCurrentPlaylistIndex();
nextPos=(currentPos+1)%playlist.length;

}

const nextSong=playlist[nextPos];

nextSongIndex=
songs.findIndex(
s=>s.src===nextSong.src
);

if(nextSongIndex<0) return;

/* already correct song buffered */
if(
nextBufferAudio.src===songs[nextSongIndex].src
){
return;
}

nextBufferAudio.pause();

nextBufferAudio.src=
songs[nextSongIndex].src;

nextBufferAudio.load();

/* force warm buffer */
const p=nextBufferAudio.play();

if(p){

p.then(()=>{
nextBufferAudio.pause();
nextBufferAudio.currentTime=0;
})
.catch(()=>{});

}

console.log(
"Buffered:",
songs[nextSongIndex].title
);

}

function pauseSong(){

audio.pause();

const cover=document.getElementById("cover");

playBtn.innerHTML=
'<i class="fas fa-play"></i>';

playBtn.classList.remove("pause");

if("mediaSession" in navigator){
navigator.mediaSession.playbackState=
"paused";
}

cover.classList.remove(
"playing",
"loading"
);

cover.classList.add("paused");

}

function playSong(){

audio.play().then(()=>{

playBtn.innerHTML =
'<i class="fas fa-pause"></i>';

playBtn.classList.add("pause");

if("mediaSession" in navigator){
navigator.mediaSession.playbackState=
"playing";
}

cover.classList.remove(
"loading",
"paused"
);

cover.classList.add("playing");

/* warm next track shortly after playback starts */
setTimeout(
preloadNextTrack,
800
);

}).catch(err=>{
console.warn(err);
});

}

    const sec = Math.floor(s % 60);

function startDrag(y) {
  isDragging = true;
  hasMoved = false;
  startY = y;
  currentY = y;

  player.style.transition = "none";
}

function moveDrag(y) {
  if (!isDragging) return;

  currentY = y;

  let delta = (currentY - startY) * 0.6;

  const maxDown = 120;
  const maxUp = -120;

  if (delta > maxDown) delta = maxDown;
  if (delta < maxUp) delta = maxUp;

  if (Math.abs(delta) > 8) {
    hasMoved = true;
  }

  player.style.transform = `translateY(${delta}px)`;
}

function endDrag() {
  if (!isDragging) return;

  isDragging = false;

  const delta = currentY - startY;

  player.style.transition = "height 0.3s ease, transform 0.3s ease";
  player.style.transform = "";

  /* drag down -> mini */
  if (delta > dragThreshold && !isMini) {
    isMini = true;
    player.classList.add("mini");

    collapseBtn.innerHTML =
      '<i class="fas fa-chevron-up"></i>';
  }

  /* drag up -> expand */
  else if (delta < -dragThreshold && isMini) {
    isMini = false;
    player.classList.remove("mini");

    collapseBtn.innerHTML =
      '<i class="fas fa-chevron-down"></i>';
  }

  setTimeout(function () {
    hasMoved = false;
  }, 120);
}

 audio.addEventListener("ended", function(){

const playlist = getCurrentPlaylist();
if(!playlist.length) return;

/* REPEAT ONE */
if(repeat === "one"){
audio.currentTime = 0;
playSong();
return;
}

const currentPos = getCurrentPlaylistIndex();
const isLastTrack =
!shuffle &&
currentPos === playlist.length - 1;

/* REPEAT OFF + last song => stop */
if(
repeat === "off" &&
isLastTrack
){
pauseSong();
audio.currentTime = 0;
return;
}

/* GAPLESS NEXT TRACK */
if(
nextBufferAudio &&
nextSongIndex !== null
){

audio.pause();

audio.src = nextBufferAudio.src;

currentIndex = nextSongIndex;

document.getElementById("title").textContent =
songs[currentIndex].title;

cover.src =
songs[currentIndex].cover;

highlight();
saveState();

audio.play().then(()=>{

cover.classList.remove(
"loading",
"paused"
);

cover.classList.add(
"playing"
);

nextPreloaded = false;

requestAnimationFrame(
preloadNextTrack
);

});

return;
}

/* FALLBACK NAVIGATION */

if(shuffle){

let newIdx =
getNextShuffleIndex(playlist);

currentIndex =
songs.findIndex(
s=>s.src===playlist[newIdx].src
);

}else{

let nextPos =
(currentPos + 1) % playlist.length;

/* extra guard for repeat off */
if(
repeat==="off" &&
currentPos===playlist.length-1
){
pauseSong();
return;
}

currentIndex =
songs.findIndex(
s=>s.src===playlist[nextPos].src
);

}

loadSong();
playSong();
highlight();
saveState();

});

// TOUCH

  startDrag(e.touches[0].clientY);
});

player.addEventListener("touchend", endDrag);

player.addEventListener(
 "touchmove",

 {passive:true}
);

// MOUSE (desktop testing)
player.addEventListener("mousedown", e => {
  if (e.target.closest("button") || e.target.closest("input")) return;
